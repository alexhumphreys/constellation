name: Constellation-iOS
options:
  bundleIdPrefix: com.constellation
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  ConstellationCore:
    path: ../../Core

targets:
  Constellation-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: ConstellationCore
        product: ConstellationCore
    # Fold the unit-test bundle into the app's auto-generated scheme so
    # `xcodebuild test -scheme Constellation-iOS` (just ios-test) runs it.
    scheme:
      testTargets:
        - Constellation-iOSTests
    info:
      path: Resources/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleDisplayName: Constellation
        # Expose the app's Documents dir over Finder / Files so the
        # SQLite store can be airdropped or backed up to Dropbox without
        # a custom share extension.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        # Declare a custom file type for snapshot exports. AirDrop and
        # the iOS share sheet need this so a `.constellation` file lands
        # back in our app on the receiving device rather than being
        # passed to a generic JSON viewer.
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.constellation.snapshot
            UTTypeDescription: Constellation Snapshot
            UTTypeConformsTo:
              - public.json
            UTTypeTagSpecification:
              public.filename-extension:
                - constellation
              public.mime-type:
                - application/json
        CFBundleDocumentTypes:
          - CFBundleTypeName: Constellation Snapshot
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.constellation.snapshot
        # Local-network sync (MultipeerConnectivity). Apple Personal
        # Team can't provision iCloud, so cross-device sync goes over
        # Bonjour/MC instead — see PeerSync.swift. Both _tcp and _udp
        # service entries are required for MC to even attempt discovery
        # on iOS 14+. The service-type string must match between peers
        # and be 1–15 chars; "constln-sync" keeps under that bound.
        NSLocalNetworkUsageDescription: "Constellation syncs your skill graph between your own iPhone and iPad over your local WiFi."
        NSBonjourServices:
          - _constln-sync._tcp
          - _constln-sync._udp
        # QR pairing flow: Constellation only accesses the camera while
        # the user is on the Scan tab of the pair sheet.
        NSCameraUsageDescription: "Constellation uses the camera to scan a pairing code shown on another device."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.constellation.ios
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        # Personal Team for on-device testing. Simulator stays signing-free
        # via the per-SDK overrides so `just ios-build` works without a
        # cert. First device run needs Xcode + -allowProvisioningUpdates.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: JN69JDJPHH
        "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": NO
        "CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]": NO

  # App-hosted unit tests. Pure-logic suites (CanvasCamera geometry) that
  # @testable-import the app to reach its internal types. The app is the
  # test host (TEST_HOST/BUNDLE_LOADER) because app code lives in the
  # executable, not a linkable library — runs on a simulator destination.
  Constellation-iOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Constellation-iOS
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Constellation-iOS.app/Constellation-iOS"
        BUNDLE_LOADER: "$(TEST_HOST)"
        "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": NO
        "CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]": NO
